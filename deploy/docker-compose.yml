# Fix docker compose project name to avoid colliding with other deploy/ projects
name: smart-admin

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: smart-admin-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-smartadmin}
      POSTGRES_USER: ${POSTGRES_USER:-smartadmin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-smartadmin-dev}
    volumes:
      - ../data/postgres:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: smart-admin-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - ../data/redis:/data
    ports:
      - "6381:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: smart-admin-backend
    restart: unless-stopped
    env_file: ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-smartadmin}:${POSTGRES_PASSWORD:-smartadmin-dev}@postgres:5432/${POSTGRES_DB:-smartadmin}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ../data/knowledge_base:/app/data/knowledge_base
      - ../data/uploads:/app/data/uploads
      - ../data/exports:/app/data/exports
      - ../data/logs:/app/data/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=2).status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: smart-admin-frontend
    restart: unless-stopped
    environment:
      # 前端通过 nginx 同源 /api 反代调用后端，无需指定绝对地址
      NEXT_PUBLIC_API_BASE: ""
    expose:
      - "3000"

  nginx:
    image: nginx:1.27-alpine
    container_name: smart-admin-nginx
    restart: unless-stopped
    ports:
      - "8081:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
