services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: smart-admin-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ../data/postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"      # 仅 dev 暴露；生产请删除
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: smart-admin-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - ../data/redis:/data
    ports:
      - "6379:6379"      # 仅 dev 暴露；生产请删除
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    profiles: ["full"]    # 只想跑 PG/Redis 时不会启动；用 --profile full 才启
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: smart-admin-backend
    restart: unless-stopped
    env_file: ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ../data/knowledge_base:/app/data/knowledge_base
      - ../data/uploads:/app/data/uploads
      - ../data/exports:/app/data/exports
      - ../data/logs:/app/data/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8000"

  frontend:
    profiles: ["full"]
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: smart-admin-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE: /api/v1
    expose:
      - "3000"

  nginx:
    profiles: ["full"]
    image: nginx:1.27-alpine
    container_name: smart-admin-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
